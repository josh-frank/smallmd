server {
    listen 80;
    server_name _;

    root /var/www/smallmd/public;
    index index.php;

    # Serve static assets directly (css, images, etc.)
    location /assets/ {
        alias /var/www/smallmd/themes/default/assets/;
        expires 7d;
        add_header Cache-Control "public";
    }

    # All other requests go through index.php
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ \.php$ {
        include        fastcgi_params;
        fastcgi_pass   unix:/run/php/php8.2-fpm.sock;
        fastcgi_param  SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param  DOCUMENT_ROOT   $document_root;
    }

    # Block direct access to .md files and internals
    location ~ \.(md|yaml|json)$ {
        deny all;
    }

    location ~ /\. {
        deny all;
    }
}
